<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Página em Desenvolvimento</title>
  <style>
    :root { color-scheme: dark; }
    html, body { height: 100%; }
    body{
      margin: 0;
      background: #000;
      color: #fff;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      display: grid;
      place-items: center;
    }
    .wrap{
      width: min(720px, calc(100% - 32px));
      text-align: center;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 16px;
      padding: 28px 18px;
    }
    .icons{
      font-size: 44px;
      letter-spacing: 6px;
      margin-bottom: 8px;
    }
    h1{
      margin: 0 0 8px;
      font-size: 26px;
      letter-spacing: 0.3px;
    }
    p{
      margin: 0;
      opacity: 0.85;
      font-size: 14px;
      line-height: 1.5;
    }
    .line{
      margin: 18px auto 0;
      height: 1px;
      width: 180px;
      background: rgba(255,255,255,0.18);

    }

      .btn-fixo-voltar{
    position: fixed;
    left: 18px;
    bottom: 18px;
    z-index: 9999;

    display: inline-flex;
    align-items: center;
    gap: 10px;

    padding: 12px 14px;
    border-radius: 14px;

    background: rgba(0,0,0,0.72);
    color: #fff;
    text-decoration: none;

    border: 1px solid rgba(255,255,255,0.18);
    box-shadow: 0 18px 50px rgba(0,0,0,0.55);

    font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    font-size: 13px;
    font-weight: 650;

    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);

    transition: transform 0.06s ease, border-color 0.15s ease, background 0.15s ease;
  }

  .btn-fixo-voltar::before{
    content: "←";
    font-weight: 800;
    opacity: 0.95;
  }

  .btn-fixo-voltar:hover{
    border-color: rgba(255,255,255,0.35);
    background: rgba(0,0,0,0.82);
  }

  .btn-fixo-voltar:active{
    transform: translateY(1px);
  }

  .btn-fixo-voltar:focus-visible{
    outline: none;
    box-shadow: 0 0 0 3px rgba(255,255,255,0.22), 0 18px 50px rgba(0,0,0,0.55);
  }
    
  </style>
</head>
<body>
    <a class="btn-fixo-voltar" href="../pages/index.html" aria-label="Voltar para o início" title="Voltar">
        Voltar
    </a>
  <main class="wrap" role="alert" aria-live="polite">
    <div class="icons" aria-hidden="true">⚠️ ⚠️ ⚠️</div>
    <h1>Página em desenvolvimento</h1>
    <p>Estamos trabalhando nesta área. Volte em breve.</p>
    <div class="line"></div>
    <p style="margin-top:14px; opacity:.7;">Se você chegou aqui por engano, retorne ao menu anterior.</p>
  </main>
</body>
</html>
